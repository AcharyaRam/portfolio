<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f4a"/>
      <stop offset="0.55" stop-color="#101636"/>
      <stop offset="1" stop-color="#070a17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818CF8" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#F472B6" stop-opacity="0.90"/>
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0.90"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="260" cy="180" r="220" fill="#818CF8" opacity="0.18" filter="url(#soft)"/>
  <circle cx="980" cy="140" r="240" fill="#F472B6" opacity="0.14" filter="url(#soft)"/>
  <circle cx="880" cy="520" r="260" fill="#67E8F9" opacity="0.12" filter="url(#soft)"/>

  <rect x="70" y="72" width="1060" height="486" rx="44" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
  <rect x="98" y="100" width="1004" height="84" rx="28" fill="rgba(255,255,255,0.06)"/>

  <text x="140" y="150" font-family="Space Grotesk, Arial, sans-serif" font-size="34" fill="rgba(255,255,255,0.92)" font-weight="700">
    Ram Acharya
  </text>
  <text x="140" y="206" font-family="Space Grotesk, Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.70)" font-weight="600">
    Full Stack Developer (MERN &amp; .NET) " Vadodara
  </text>

  <rect x="140" y="250" width="920" height="6" rx="999" fill="url(#accent)" opacity="0.95"/>

  <text x="140" y="318" font-family="Space Grotesk, Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.84)" font-weight="600">
    Featured: Pulse Pharma
  </text>
  <text x="140" y="360" font-family="Space Grotesk, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.66)" font-weight="500">
    ASP.NET Core " C# " Entity Framework " SQL Server
  </text>

  <text x="140" y="430" font-family="Space Grotesk, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)" font-weight="500">
    ramacharya.me
  </text>
</svg>

